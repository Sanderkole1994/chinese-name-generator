<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>起名 · Chinese Name Generator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cinzel:wght@400;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#b41e1e;--red-deep:#8a1515;--gold:#c8963e;
  --gold-soft:rgba(200,150,50,0.22);--cream:#e8dcc8;
  --cream-dim:rgba(232,220,200,0.55);--cream-faint:rgba(232,220,200,0.18);
  --bg:#0d0a0a;
}
html,body{min-height:100vh;background:var(--bg);color:var(--cream);font-family:'IM Fell English',Georgia,serif;display:flex;align-items:flex-start;justify-content:center;padding:1.5rem 1rem 3rem;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse at 20% 50%,rgba(180,30,30,.09) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(200,150,50,.07) 0%,transparent 50%)}
.deco-ring{position:fixed;border-radius:50%;pointer-events:none;z-index:0;border:1px solid rgba(180,30,30,.13)}
.dr1{width:420px;height:420px;top:-110px;right:-110px}
.dr2{width:520px;height:520px;bottom:-160px;left:-90px;border-color:rgba(200,150,50,.09)}
/* Hide side characters on narrow screens — they overlap content */
.deco-char{position:fixed;color:rgba(180,30,30,.065);font-size:4.5rem;font-weight:bold;writing-mode:vertical-rl;pointer-events:none;z-index:0;top:50%;transform:translateY(-50%);letter-spacing:.5rem}
.dl1{left:1%}.dl2{left:5%}.dr1c{right:1%}.dr2c{right:5%}
.wrap{position:relative;z-index:1;width:100%;max-width:580px}

/* Header */
.header{text-align:center;margin-bottom:2rem}
.header-han{font-size:3.8rem;letter-spacing:.8rem;color:var(--gold);line-height:1;margin-bottom:.2rem}
.header-title{font-family:'Cinzel',serif;font-size:.85rem;letter-spacing:.4rem;text-transform:uppercase;color:var(--cream);font-weight:400}
.divider{width:60px;height:1px;margin:1rem auto;background:linear-gradient(90deg,transparent,var(--red),transparent)}
.header-sub{color:var(--cream-dim);font-size:.78rem;letter-spacing:.06rem;font-style:italic;padding:0 .5rem}

/* Card */
.card{background:rgba(255,255,255,.03);border:1px solid var(--gold-soft);padding:1.5rem;position:relative}
.card::before{content:'';position:absolute;inset:3px;border:1px solid rgba(200,150,50,.08);pointer-events:none}
.field-row{display:flex;gap:.75rem}
.field-row .field{flex:1}
.field{margin-bottom:1.1rem}
.field:last-of-type{margin-bottom:0}
label{display:flex;align-items:center;gap:.5rem;color:var(--gold);font-size:.65rem;letter-spacing:.18rem;text-transform:uppercase;margin-bottom:.38rem;font-family:'Cinzel',serif}
.lbl-han{font-family:'IM Fell English',Georgia,serif;font-size:1rem;opacity:.85}
input{
  width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(200,150,50,.25);
  padding:.75rem 1rem;color:var(--cream);font-size:1rem;/* 1rem prevents iOS zoom */
  font-family:'IM Fell English',Georgia,serif;outline:none;
  transition:border-color .25s,background .25s;
  -webkit-appearance:none;border-radius:0;/* Remove iOS default styling */
  min-height:44px;/* Apple touch target minimum */
}
input::placeholder{color:rgba(232,220,200,.25)}
input:focus{border-color:rgba(180,30,30,.6);background:rgba(180,30,30,.05)}

/* Gender toggle */
.gender-row{display:flex;gap:.75rem}
.gender-btn{
  flex:1;padding:.75rem .5rem;background:rgba(255,255,255,.04);
  border:1px solid rgba(200,150,50,.25);color:var(--cream-dim);
  font-size:.68rem;letter-spacing:.15rem;text-transform:uppercase;
  cursor:pointer;font-family:'Cinzel',serif;transition:all .25s;
  min-height:44px;/* Touch target */
  -webkit-tap-highlight-color:transparent;
}
.gender-btn.active-f{background:rgba(180,100,120,.15);border-color:rgba(200,100,130,.5);color:#e8b4c0}
.gender-btn.active-m{background:rgba(50,100,180,.12);border-color:rgba(80,130,200,.4);color:#a8c4e8}
.gender-btn:hover{border-color:rgba(200,150,50,.5);color:var(--cream)}

.btn{
  width:100%;padding:1rem;background:linear-gradient(135deg,var(--red),var(--red-deep));
  border:none;color:#f5e6c8;font-size:.75rem;letter-spacing:.25rem;text-transform:uppercase;
  cursor:pointer;font-family:'Cinzel',serif;transition:all .3s;margin-top:1.1rem;
  min-height:48px;-webkit-tap-highlight-color:transparent;
}
.btn:hover{background:linear-gradient(135deg,#c42525,#9a1f1f)}
.btn:active{background:linear-gradient(135deg,#9a1515,#7a1010);transform:scale(.99)}
.btn:disabled{background:rgba(100,100,100,.2);color:rgba(255,255,255,.3);cursor:not-allowed}

/* Result */
.result{margin-top:1.5rem;background:rgba(180,30,30,.06);border:1px solid rgba(180,30,30,.3);padding:1.5rem;text-align:center;display:none}
.result.show{display:block;animation:fadeUp .7s ease forwards}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.result-label{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.28rem;text-transform:uppercase;color:rgba(200,150,50,.6);margin-bottom:.9rem}
.result-name{font-size:clamp(3.5rem,15vw,5.5rem);color:var(--cream);letter-spacing:.5rem;line-height:1;margin-bottom:.5rem;text-shadow:0 0 40px rgba(180,30,30,.35)}
.result-pinyin{font-size:clamp(.9rem,4vw,1.1rem);color:var(--gold);letter-spacing:.2rem;margin-bottom:.35rem;font-style:italic}
.result-romanized{font-size:clamp(.65rem,3vw,.78rem);color:var(--cream-dim);letter-spacing:.08rem;margin-bottom:1.1rem;font-style:italic}
.result-divider{width:40px;height:1px;background:rgba(180,30,30,.4);margin:0 auto 1.1rem}
.result-parts{display:flex;justify-content:center;gap:1.5rem;margin-bottom:1rem}
.result-part{text-align:center}
.result-part-label{font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.18rem;text-transform:uppercase;color:rgba(200,150,50,.5);margin-bottom:.2rem}
.result-part-char{font-size:clamp(1.6rem,6vw,2rem);color:var(--cream)}
.result-part-py{font-size:.65rem;color:var(--gold);font-style:italic;margin-top:.12rem}
.sep{width:1px;background:rgba(200,150,50,.2)}
.result-meaning{color:var(--cream-dim);font-size:clamp(.72rem,3vw,.8rem);font-style:italic;margin-bottom:.85rem}
.element-badge{display:inline-flex;align-items:center;gap:.4rem;background:rgba(200,150,50,.07);border:1px solid rgba(200,150,50,.2);padding:.3rem .7rem;font-family:'Cinzel',serif;font-size:.56rem;letter-spacing:.12rem;color:rgba(200,150,50,.8);text-transform:uppercase;margin-bottom:.5rem;flex-wrap:wrap;justify-content:center;text-align:center}

/* Reasoning */
.result-reasoning{margin-top:1.2rem;text-align:left}
.reasoning-divider{width:100%;height:1px;background:rgba(200,150,50,.15);margin-bottom:1rem}
.reasoning-label{font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.22rem;text-transform:uppercase;color:rgba(200,150,50,.55);margin-bottom:.8rem;text-align:center}
.reasoning-grid{display:flex;flex-direction:column;gap:.55rem}
.reasoning-row{display:flex;gap:.7rem;align-items:flex-start;background:rgba(255,255,255,.02);border-left:2px solid rgba(180,30,30,.35);padding:.55rem .7rem}
.reasoning-icon{font-size:.95rem;flex-shrink:0;line-height:1.5;min-width:1.3rem;text-align:center}
.reasoning-text{font-size:clamp(.7rem,3vw,.76rem);color:var(--cream-dim);line-height:1.72}
.reasoning-text strong{color:var(--gold);font-style:normal;font-weight:normal}
.reasoning-text em{color:var(--cream);font-style:italic}

/* Classical quote */
.classical-block{margin-top:1rem;background:rgba(180,30,30,.04);border:1px solid rgba(180,30,30,.18);padding:.85rem 1rem;text-align:center}
.classical-chinese{font-size:clamp(.85rem,4vw,1rem);color:var(--gold);letter-spacing:.25rem;margin-bottom:.28rem}
.classical-source{font-size:.55rem;color:rgba(232,220,200,.38);font-family:'Cinzel',serif;letter-spacing:.12rem;text-transform:uppercase;margin-bottom:.32rem}
.classical-trans{font-size:clamp(.65rem,3vw,.72rem);color:var(--cream-dim);font-style:italic}

/* Download button */
.share-btn{
  display:none;width:100%;margin-top:1.2rem;padding:.85rem 1rem;
  background:transparent;border:1px solid rgba(200,150,50,.35);
  color:var(--gold);font-size:.68rem;letter-spacing:.22rem;text-transform:uppercase;
  cursor:pointer;font-family:'Cinzel',serif;transition:all .3s;
  min-height:48px;-webkit-tap-highlight-color:transparent;
}
.share-btn:hover{background:rgba(200,150,50,.08);border-color:var(--gold)}
.share-btn:active{background:rgba(200,150,50,.14);transform:scale(.99)}
.share-btn.visible{display:block}

.footer{text-align:center;color:var(--cream-faint);font-size:.58rem;letter-spacing:.08rem;margin-top:1.5rem;font-family:'Cinzel',serif;padding:0 .5rem}

/* ── Mobile responsive breakpoints ─────────────────────────── */
@media (max-width: 480px) {
  html,body{padding:1rem .75rem 2.5rem}
  .header-han{font-size:3rem;letter-spacing:.6rem}
  .header-title{font-size:.75rem;letter-spacing:.28rem}
  .header-sub{font-size:.72rem}
  .header{margin-bottom:1.5rem}
  /* Stack first/last name vertically on very small screens */
  .field-row{flex-direction:column;gap:0}
  .field-row .field{flex:none;width:100%}
  .card{padding:1.25rem}
  .result{padding:1.25rem}
  .result-name{letter-spacing:.35rem}
  .result-parts{gap:1rem}
  /* Hide decorative side characters completely on mobile */
  .deco-char{display:none}
  .deco-ring{display:none}
  .btn{font-size:.7rem;letter-spacing:.2rem}
  .gender-btn{font-size:.62rem;letter-spacing:.1rem}
}

@media (max-width: 360px) {
  .header-han{font-size:2.6rem}
  .result-name{font-size:3rem}
  .card{padding:1rem}
  .result{padding:1rem}
}
</style>
</head>
<body>
<div class="deco-ring dr1"></div>
<div class="deco-ring dr2"></div>
<div class="deco-char dl1">福寿</div>
<div class="deco-char dl2">雅</div>
<div class="deco-char dr1c">慧志</div>
<div class="deco-char dr2c">明</div>

<div class="wrap">
  <div class="header">
    <div class="header-han">起名</div>
    <div class="header-title">Chinese Name Generator</div>
    <div class="divider"></div>
    <div class="header-sub">A name is the first gift — chosen with sound, meaning, and destiny</div>
  </div>

  <div class="card">
    <div class="field-row">
      <div class="field">
        <label><span class="lbl-han">名</span> First Name</label>
        <input id="inp-firstname" type="text" placeholder="e.g. Sophie, Jan, Merel…"/>
      </div>
      <div class="field">
        <label><span class="lbl-han">姓</span> Last Name</label>
        <input id="inp-lastname" type="text" placeholder="e.g. de Vries, Bakker…"/>
      </div>
    </div>
    <div class="field">
      <label><span class="lbl-han">性</span> Gender</label>
      <div class="gender-row">
        <button class="gender-btn" id="btn-female" onclick="selectGender('female')">♀ &nbsp;Female 女</button>
        <button class="gender-btn" id="btn-male"   onclick="selectGender('male')">♂ &nbsp;Male 男</button>
      </div>
    </div>
    <div class="field">
      <label><span class="lbl-han">趣</span> Favourite Hobby</label>
      <input id="inp-hobby" type="text" placeholder="e.g. muziek, lezen, sport, koken, kunst…"/>
    </div>
    <div class="field">
      <label><span class="lbl-han">愿</span> Your Wish</label>
      <input id="inp-job" type="text" placeholder="e.g. peace, strength, wisdom, love, adventure…"/>
    </div>
    <button class="btn" id="gen-btn" onclick="generate()" disabled>Generate My Name &nbsp;生成名字</button>
  </div>

  <div class="result" id="result">
    <div class="result-label" id="res-gender-label">Your Chinese Name</div>
    <div class="result-name" id="res-full"></div>
    <div class="result-pinyin" id="res-pinyin"></div>
    <div class="result-romanized" id="res-romanized"></div>
    <div class="result-divider"></div>
    <div class="result-parts">
      <div class="result-part">
        <div class="result-part-label">Surname 姓</div>
        <div class="result-part-char" id="res-surname"></div>
        <div class="result-part-py"   id="res-surname-py"></div>
      </div>
      <div class="sep"></div>
      <div class="result-part">
        <div class="result-part-label">Given Name 名</div>
        <div class="result-part-char" id="res-given"></div>
        <div class="result-part-py"   id="res-given-py"></div>
      </div>
    </div>
    <div class="result-meaning" id="res-meaning"></div>
    <div id="res-element-badge"></div>
    <div class="result-reasoning">
      <div class="reasoning-divider"></div>
      <div class="reasoning-label">The Art Behind Your Name</div>
      <div class="reasoning-grid" id="res-reasoning-grid"></div>
    </div>
    <div class="classical-block" id="res-classical" style="display:none">
      <div class="classical-chinese" id="res-classical-text"></div>
      <div class="classical-source"  id="res-classical-source"></div>
      <div class="classical-trans"   id="res-classical-trans"></div>
    </div>
    <button class="share-btn" id="share-btn" onclick="shareCard()">⬇ Download Name Card as Photo</button>
    <canvas id="share-canvas" style="display:none"></canvas>
  </div>

  <div class="footer">名以载志，音以传情 &nbsp;·&nbsp; A name carries ambition; its sound carries the heart</div>
</div>

<script>
/* ── State ─────────────────────────────────────────────────────── */
let selectedGender = null;

function selectGender(g) {
  selectedGender = g;
  document.getElementById('btn-female').className = 'gender-btn' + (g==='female' ? ' active-f' : '');
  document.getElementById('btn-male').className   = 'gender-btn' + (g==='male'   ? ' active-m' : '');
  checkReady();
}
function checkReady() {
  const name = document.getElementById('inp-firstname').value.trim();
  document.getElementById('gen-btn').disabled = !(name && selectedGender);
}
document.getElementById('inp-firstname').addEventListener('input', checkReady);
document.querySelectorAll('input').forEach(inp => inp.addEventListener('keydown', e => { if(e.key==='Enter') generate(); }));

/* ── Surnames ──────────────────────────────────────────────────── */
const SURNAMES = {
  a:{char:"安",py:"Ān",  el:"earth",meaning:"peace and stability",history:"Traced to Han dynasty envoys from Anxi (Parthia). 安 means 'peace' — one of the most auspicious of all Chinese surnames, linked to diplomacy and calm governance."},
  b:{char:"白",py:"Bái", el:"metal",meaning:"purity and clarity",history:"Ancient Zhou dynasty surname. 白 means 'white' or 'pure' — the surname of the Tang poet Bai Juyi, associated with moonlight and honesty."},
  c:{char:"陈",py:"Chén",el:"earth",meaning:"ancient and enduring",history:"Royal house of the State of Chen (1045–478 BCE). One of China's most widespread surnames, carrying three thousand years of aristocratic legacy."},
  d:{char:"丁",py:"Dīng",el:"fire", meaning:"strength and solidity",history:"One of the oldest surnames, depicted as a nail in ancient script — a symbol of structural strength dating to the Shang dynasty."},
  e:{char:"鄂",py:"È",   el:"wood", meaning:"bold and untamed",history:"From the ancient frontier State of E. 鄂 evokes the energy of borderlands — bold, outspoken, and unwilling to be contained."},
  f:{char:"方",py:"Fāng",el:"wood", meaning:"upright and principled",history:"Descended from Fang Shu of Zhou, celebrated for military virtue. 方 means 'square' — the symbol of moral uprightness in classical Chinese thought."},
  g:{char:"高",py:"Gāo", el:"fire", meaning:"elevated and noble",history:"From the State of Qi. 高 means 'tall' — a spirit that reaches above the ordinary, of ambition that does not settle."},
  h:{char:"何",py:"Hé",  el:"water",meaning:"gentle persistence",history:"From the Ji clan of Zhou. Legend: a family crossing the He River took it as their name. Carries the quality of flowing water."},
  i:{char:"伊",py:"Yī",  el:"water",meaning:"graceful and wise",history:"Associated with Yi Yin who founded the Shang dynasty's golden age. Carries connotations of quiet wisdom and refined character."},
  j:{char:"江",py:"Jiāng",el:"water",meaning:"vast and flowing",history:"From the ancient Yangtze basin state. 江 means 'river' — depth, persistence, and the life-giving force of flowing water."},
  k:{char:"康",py:"Kāng",el:"metal",meaning:"health and abundance",history:"From the Duke of Kang of Zhou. 康 means 'wellness' — one of the most auspicious surname characters a family can carry."},
  l:{char:"林",py:"Lín", el:"wood", meaning:"rooted and flourishing",history:"Descended from Bi Gan of the Shang. Two 木 trees side by side — vitality, growth, and deep roots. The character represents thriving life."},
  m:{char:"马",py:"Mǎ",  el:"fire", meaning:"swift and spirited",history:"From Maqiu (Horse Hill). 马 — the horse — symbol of ambition, speed, and noble spirit across Chinese history."},
  n:{char:"宁",py:"Níng",el:"water",meaning:"tranquil and deep",history:"From the Wei family of Wei State. 宁 means 'serenity' — the still surface of deep water, profound inner calm."},
  o:{char:"欧",py:"Ōu",  el:"water",meaning:"expansive and gracious",history:"Simplified from Ouyang, surname of Song dynasty master writer Ouyang Xiu. Carries literary grace and expansive outlook."},
  p:{char:"潘",py:"Pān", el:"water",meaning:"overflowing with life",history:"From Prince Pan of Zhou. 潘 suggests water spilling beyond its banks — abundance and vitality in full expression."},
  q:{char:"钱",py:"Qián",el:"metal",meaning:"resourceful and valued",history:"From Zhou dynasty treasurer Peng Fu. Centuries of association with shrewdness and practical intelligence."},
  r:{char:"任",py:"Rèn", el:"water",meaning:"responsible and capable",history:"Among the oldest Huangdi bloodline surnames. 任 means 'to bear responsibility' — those entrusted with great work."},
  s:{char:"宋",py:"Sòng",el:"fire", meaning:"cultured and refined",history:"From the royal house of Shang after its fall. The Song dynasty (960–1279 CE) was China's golden age of poetry and painting."},
  t:{char:"唐",py:"Táng",el:"fire", meaning:"glorious and cosmopolitan",history:"The Tang dynasty (618–907 CE) — China's most celebrated era of poetry, culture, and cosmopolitan brilliance."},
  u:{char:"尤",py:"Yóu", el:"wood", meaning:"outstanding and remarkable",history:"From the Shen Nong clan. 尤 means 'especially outstanding' — those set apart from the ordinary by some remarkable quality."},
  v:{char:"范",py:"Fàn", el:"water",meaning:"exemplary and principled",history:"From the Fan State. Linked to Fan Zhongyan: 'worry before the world worries; rejoice only after the world rejoices.'"},
  w:{char:"王",py:"Wáng",el:"earth",meaning:"sovereign and dignified",history:"The most common surname in the world. Descended from the Zhou royal house. 王 means 'king' — the surname of emperors, poets, and calligraphers."},
  x:{char:"徐",py:"Xú",  el:"water",meaning:"patient and steadfast",history:"From the benevolent Xu State. 徐 means slowness and patience — the unhurried confidence of one who knows their path."},
  y:{char:"杨",py:"Yáng",el:"wood", meaning:"sunlit and alive",history:"The poplar tree — quick-growing, tall, always catching the light. Among the most common Chinese surnames, full of visible energy."},
  z:{char:"张",py:"Zhāng",el:"fire",meaning:"expansive and reaching",history:"From the inventor of the bow and arrow, grandson of the Yellow Emperor. 张 contains 弓 (bow) — tension, reach, and skill."}
};

/* ── Five Elements ─────────────────────────────────────────────── */
const WUXING = {
  wood: {name:"Wood 木",  emoji:"🌿",virtue:"growth, vitality, and upward aspiration",season:"Spring",  generates:"fire" },
  fire: {name:"Fire 火",  emoji:"🔥",virtue:"brilliance, passion, and outward expression",season:"Summer",  generates:"earth"},
  earth:{name:"Earth 土", emoji:"🌏",virtue:"stability, nurturing, and deep-rootedness",season:"Late Summer",generates:"metal"},
  metal:{name:"Metal 金", emoji:"✨",virtue:"precision, elegance, and refined excellence",season:"Autumn",  generates:"water"},
  water:{name:"Water 水", emoji:"💧",virtue:"wisdom, adaptability, and quiet depth",season:"Winter",  generates:"wood" }
};

/* ── Gendered Phonetic Banks ───────────────────────────────────── */
const PHONETIC_FEMALE = [
  {char:"安",py:"an",  el:"earth",meaning:"serene and peaceful",        radical:"peace"},
  {char:"艾",py:"ai",  el:"wood", meaning:"elegant as garden herbs",    radical:"艹 herb"},
  {char:"冰",py:"bing",el:"water",meaning:"pure as winter ice",         radical:"water"},
  {char:"婵",py:"chan",el:"water",meaning:"graceful as the moon",        radical:"女 female"},
  {char:"晨",py:"chen",el:"fire", meaning:"golden morning light",        radical:"sun"},
  {char:"春",py:"chun",el:"wood", meaning:"the warmth of spring",        radical:"sun"},
  {char:"丹",py:"dan", el:"fire", meaning:"pure cinnabar red",           radical:"vermilion"},
  {char:"朵",py:"duo", el:"wood", meaning:"a blossoming flower",         radical:"wood"},
  {char:"恩",py:"en",  el:"water",meaning:"gracious kindness",           radical:"heart"},
  {char:"芳",py:"fang",el:"wood", meaning:"fragrant virtue",             radical:"艹 flower"},
  {char:"菲",py:"fei", el:"wood", meaning:"fragrant and lovely",         radical:"艹 flower"},
  {char:"虹",py:"hong",el:"fire", meaning:"rainbow after rain",          radical:"nature"},
  {char:"花",py:"hua", el:"wood", meaning:"in full blossom",             radical:"艹 flower"},
  {char:"慧",py:"hui", el:"fire", meaning:"brilliant inner wisdom",      radical:"heart"},
  {char:"嘉",py:"jia", el:"wood", meaning:"excellent and gracious",      radical:"woman"},
  {char:"静",py:"jing",el:"water",meaning:"serene stillness",            radical:"blue"},
  {char:"娟",py:"juan",el:"water",meaning:"graceful and lovely",         radical:"女 female"},
  {char:"兰",py:"lan", el:"wood", meaning:"pure as an orchid",           radical:"艹 flower"},
  {char:"磊",py:"lei", el:"earth",meaning:"upright as boulders",         radical:"stone"},
  {char:"丽",py:"li",  el:"fire", meaning:"brilliant beauty",            radical:"beauty"},
  {char:"莲",py:"lian",el:"water",meaning:"lotus rising from water",     radical:"艹 flower"},
  {char:"灵",py:"ling",el:"water",meaning:"spiritually alive",           radical:"rain"},
  {char:"露",py:"lu",  el:"water",meaning:"dewdrop on a petal",          radical:"rain"},
  {char:"曼",py:"man", el:"water",meaning:"gracefully flowing",          radical:"silk"},

function getClassicalQuote(hobby, wish) {
  const all = (hobby+' '+wish).toLowerCase();
  if(all.match(/muziek|music|muzikant|musician/)) return CLASSICAL_QUOTES.music;
  if(all.match(/lezen|reading/))                  return CLASSICAL_QUOTES.reading;
  if(all.match(/kunst|art|ontwerper|designer/))   return CLASSICAL_QUOTES.art;
  if(all.match(/natuur|nature/))                  return CLASSICAL_QUOTES.nature;
  if(all.match(/reizen|travel|avontuur|adventure/)) return CLASSICAL_QUOTES.adventure;
  if(all.match(/dansen|dancing/))                 return CLASSICAL_QUOTES.dance;
  if(all.match(/schrijven|writing|schrijver|writer/)) return CLASSICAL_QUOTES.writing;
  if(all.match(/peace|vrede|rust|nrust/))         return CLASSICAL_QUOTES.peace;
  if(all.match(/love|liefde|amor/))               return CLASSICAL_QUOTES.love;
  if(all.match(/wisdom|wijsheid|kennis/))         return CLASSICAL_QUOTES.wisdom;
  if(all.match(/strength|kracht|sterkte/))        return CLASSICAL_QUOTES.strength;
  if(all.match(/freedom|vrijheid|vrij/))          return CLASSICAL_QUOTES.freedom;
  if(all.match(/hope|hoop/))                      return CLASSICAL_QUOTES.hope;
  if(all.match(/courage|moed|dapper/))            return CLASSICAL_QUOTES.courage;
  if(all.match(/harmony|harmonie/))               return CLASSICAL_QUOTES.harmony;
  if(all.match(/dream|droom/))                    return CLASSICAL_QUOTES.dream;
  return CLASSICAL_QUOTES.default;
}

/* ── Phonetic Engine ───────────────────────────────────────────── */
function normalizeSound(str) {
  return str.toLowerCase().replace(/sch/g,'s').replace(/tch/g,'ch').replace(/ch/g,'sh').replace(/th/g,'t').replace(/ph/g,'f').replace(/oe/g,'u').replace(/ie/g,'i').replace(/aa/g,'a').replace(/ee/g,'i').replace(/oo/g,'u').replace(/ou|au/g,'ao').replace(/eu/g,'e').replace(/ij|ei/g,'ai').replace(/ui/g,'wei').replace(/[^a-z]/g,'');
}
function getSyllables(name) {
  const norm = normalizeSound(name), vowels = 'aeiou', syl = [];
  let cur = '';
  for (let i = 0; i < norm.length; i++) {
    cur += norm[i];
    if (vowels.includes(norm[i]) && (!vowels.includes(norm[i+1]||'') || cur.length >= 3)) { syl.push(cur); cur = ''; }
  }
  if (cur) syl.push(cur);
  return syl.filter(s => s.length > 0).slice(0, 2);
}
function phoneticScore(syllable, entryPy) {
  const s = syllable.toLowerCase().trim(), p = entryPy.toLowerCase().trim();
  if (!s||!p) return 0;
  if (p===s) return 20;
  if (p.startsWith(s)||s.startsWith(p)) return 15;
  const getInit = x => { const m = x.match(/^[^aeiou]+/); return m ? m[0] : ''; };
  const getVow  = x => x.replace(/^[^aeiou]*/,'');
  const sI=getInit(s),pI=getInit(p),sV=getVow(s),pV=getVow(p);
  if (sI&&sI===pI&&sV&&sV===pV) return 12;
  if (sI&&sI===pI) return 7;
  if (sV&&sV===pV&&sV.length>0) return 5;
  if (s[0]===p[0]) return 3;
  return 0;
}
function pickPhoneticChar(syllable, exclude, bank, preferEl) {
  let best = null, bestScore = -1;
  for (const entry of bank) {
    if (exclude.includes(entry.char)) continue;
    let sc = phoneticScore(syllable, entry.py);
    if (entry.el === preferEl) sc += 2;
    if (sc > bestScore) { bestScore = sc; best = entry; }
  }
  return best || bank[Math.abs((syllable.charCodeAt(0)||0)) % bank.length];
}
function getChars(map, input) {
  const key = (input||'').toLowerCase().trim();
  for (const [k, v] of Object.entries(map)) { if (key.includes(k)) return v; }
  return map.default;
}
function pick(arr, seed) { return arr[Math.abs(seed) % arr.length]; }

/* ── Main Generate ─────────────────────────────────────────────── */
function generate() {
  const firstname = document.getElementById('inp-firstname').value.trim();
  const lastname  = document.getElementById('inp-lastname').value.trim();
  const hobby     = document.getElementById('inp-hobby').value.trim();
  const wish      = document.getElementById('inp-job').value.trim();
  const gender    = selectedGender;
  if (!firstname || !gender) return;

  const isFemale     = gender === 'female';
  const phoneticBank = isFemale ? PHONETIC_FEMALE : PHONETIC_MALE;
  const hobbyMap     = isFemale ? HOBBY_FEMALE    : HOBBY_MALE;
  const wishMap      = isFemale ? WISH_FEMALE     : WISH_MALE;

  // Surname
  const surnameSource = lastname || firstname;
  const fl = surnameSource.toLowerCase().replace(/[^a-z]/g,'')[0] || 'w';
  const sData   = SURNAMES[fl] || SURNAMES['w'];
  const surname = sData.char;
  const harmonicEl = WUXING[sData.el].generates;
  const wxH        = WUXING[harmonicEl];

  // Phonetic given name
  const syllables = getSyllables(firstname);
  const syl1 = syllables[0] || normalizeSound(firstname).slice(0,3) || 'a';
  const phon1 = pickPhoneticChar(syl1, [surname], phoneticBank, harmonicEl);

  let given1, given2, twoPhonetic = false, phon2 = null;
  let meaning1, meaning2, radical1;

  if (syllables.length >= 2) {
    phon2 = pickPhoneticChar(syllables[1], [surname, phon1.char], phoneticBank, harmonicEl);
    given1 = phon1.char;
    given2 = phon2.char === phon1.char
      ? pickPhoneticChar(syllables[1], [surname, phon1.char, phon2.char], phoneticBank, harmonicEl).char
      : phon2.char;
    twoPhonetic = true;
    meaning1 = phon1.meaning;
    meaning2 = (phoneticBank.find(e => e.char === given2) || {meaning:'luminous'}).meaning;
    radical1 = phon1.radical;
  } else {
    given1 = phon1.char; meaning1 = phon1.meaning; radical1 = phon1.radical;
    const seed = (hobby.charCodeAt(0)||65) + (wish.charCodeAt(0)||65) + firstname.length;
    const pool = hobby ? getChars(hobbyMap, hobby) : getChars(wishMap, wish);
    given2 = pick(pool.filter(c => c !== given1 && c !== surname), seed);
    meaning2 = (phoneticBank.find(e => e.char === given2) || {meaning:'auspicious'}).meaning;
  }

  const full   = surname + given1 + given2;
  const pySurn = py(surname);
  const py1    = py(given1);
  const py2    = py(given2);
  const pinyin = `${pySurn} ${py1}${py2}`;
  const fullWestern = lastname ? `${firstname} ${lastname}` : firstname;

  // DOM
  const genderLabel = isFemale ? 'Female Name 女名' : 'Male Name 男名';
  document.getElementById('res-gender-label').textContent  = genderLabel;
  document.getElementById('res-full').textContent          = full;
  document.getElementById('res-pinyin').textContent        = pinyin;
  document.getElementById('res-romanized').textContent     = `Sounds like: ${py1}${py2} · ${meaning1}, ${meaning2}`;
  document.getElementById('res-surname').textContent       = surname;
  document.getElementById('res-surname-py').textContent    = pySurn;
  document.getElementById('res-given').textContent         = given1 + given2;
  document.getElementById('res-given-py').textContent      = py1 + py2;
  document.getElementById('res-meaning').textContent       = `❝ ${meaning1.charAt(0).toUpperCase()+meaning1.slice(1)}, ${meaning2} ❞`;
  document.getElementById('res-element-badge').innerHTML   = `<div class="element-badge">${wxH.emoji} ${wxH.name} · ${wxH.virtue}</div>`;

  // Reasoning
  const surnameRow = lastname
    ? `Your family name <strong>${surname}</strong> (${pySurn}) is derived from the initial of your last name <strong>${lastname}</strong>. In Chinese culture (家谱), the surname comes first — it is the root from which the given name grows. The <strong>${surname}</strong> clan's legacy: <em>${sData.history}</em>`
    : `Your family name <strong>${surname}</strong> (${pySurn}) is derived from the first letter of <strong>${firstname}</strong>. In Chinese tradition, the surname leads everything. The <strong>${surname}</strong> surname: <em>${sData.history}</em>`;

  const elementRow = `The <strong>${surname}</strong> surname belongs to <strong>${WUXING[sData.el].name}</strong> — the element of ${WUXING[sData.el].virtue}. Following the principle of mutual generation (五行相生): <strong>${WUXING[sData.el].name} generates ${wxH.name}</strong>. Your given name draws from the <strong>${wxH.name}</strong> element — ${wxH.virtue} — so that your name creates a living current of energy flowing in one harmonious direction.`;

  let phRow1, phRow2;
  if (twoPhonetic) {
    phRow1 = `The first given character <strong>${given1}</strong> (${py1}) is the top phonetic match for the opening syllable of <strong>${firstname}</strong>. Its pinyin <em>"${py1}"</em> mirrors how your name begins. With its <em>${radical1}</em> component, it carries the meaning: <em>"${meaning1}"</em>. Chinese naming demands every character be both euphonic (好听) and meaningful (有意义).`;
    phRow2 = `The second given character <strong>${given2}</strong> (${py2}) mirrors the second syllable of <strong>${firstname}</strong>, with pinyin <em>"${py2}"</em>. It means <em>"${meaning2}"</em>. Spoken together, <em>${py1}${py2}</em> flows as a genuine Chinese given name — the 双字名 (two-character name) style, now used by over 80% of Chinese people — while carrying the unmistakable echo of <strong>${firstname}</strong>. Like Jin Yong's heroes whose names ring with natural imagery (令狐冲, 黄蓉, 郭靖), your name sounds as if it belongs in the world of the rivers and lakes.`;
  } else {
    phRow1 = `The first given character <strong>${given1}</strong> (${py1}) is the closest phonetic match to <strong>${firstname}</strong> in the character bank. Its pinyin <em>"${py1}"</em> echoes your name's opening sound — the technique of 音译 (phonetic transliteration). With its <em>${radical1}</em> component, the character means: <em>"${meaning1}"</em>.`;
    phRow2 = `The second given character <strong>${given2}</strong> (${py2}) is chosen for depth — inspired by your ${hobby ? `hobby (<strong>${hobby}</strong>)` : wish ? `wish (<strong>${wish}</strong>)` : 'personal essence'}. In the tradition of Jin Yong's wuxia characters — whose names carry their deepest nature (逍遥, 无忌, 郭靖) — this character encodes what you aspire to: <em>"${meaning2}"</em>. One character carries the music of your name; the other carries your heart's intention.`;
  }

  const genderPhilosophy = isFemale
    ? `Following classical tradition, your name draws from characters of beauty, nature, and inner grace — the 女 (female), 艹 (flower), and 玉 (jade) radical families that have defined feminine names for three thousand years of Chinese culture.`
    : `Following classical tradition, your name draws from characters of strength, virtue, and outward achievement — the 亻 (person), 木 (tree), and 力 (force) radical families that have shaped masculine names across three millennia.`;

  const harmonyRow = `Together, <strong>${given1}${given2}</strong> forms a name where surname and given name flow in elemental harmony. The ${WUXING[sData.el].name} of <strong>${surname}</strong> generates the ${wxH.name} of your given name — as ${WUXING[sData.el].season.toLowerCase()} gives rise to ${wxH.season.toLowerCase()}. A name that flows in the direction of 相生 (mutual generation) is considered not only beautiful, but fortunate.`;

  const rows = [
    {icon:"姓", text: surnameRow},
    {icon:"五", text: elementRow},
    {icon:"音", text: phRow1},
    {icon:"意", text: phRow2},
    {icon: isFemale ? "女" : "男", text: genderPhilosophy},
    {icon:"和", text: harmonyRow},
    {icon:"全", text: `Your complete Chinese name is <strong>${full}</strong>, pronounced <em>${pinyin}</em>. Written surname first, given name second — it stands as a genuine Chinese name while carrying the unmistakable sound of <strong>${fullWestern}</strong>. A bridge between worlds, built on three thousand years of tradition.`}
  ];

  document.getElementById('res-reasoning-grid').innerHTML = rows.map(r =>
    `<div class="reasoning-row"><div class="reasoning-icon">${r.icon}</div><div class="reasoning-text">${r.text}</div></div>`
  ).join('');

  // Classical quote
  const quote = getClassicalQuote(hobby, wish);
  document.getElementById('res-classical-text').textContent   = quote.text;
  document.getElementById('res-classical-source').textContent = quote.source;
  document.getElementById('res-classical-trans').textContent  = '"' + quote.trans + '"';
  document.getElementById('res-classical').style.display      = 'block';

  const res = document.getElementById('result');
  res.classList.remove('show'); void res.offsetWidth; res.classList.add('show');
  document.getElementById('share-btn').classList.add('visible');

  window._cardData = {
    full, pinyin, pySurn, py1, py2, surname, given1, given2,
    meaning1, meaning2,
    element: wxH.name, elementEmoji: wxH.emoji, elementVirtue: wxH.virtue,
    surnameElement: WUXING[sData.el].name,
    surnameElementEmoji: WUXING[sData.el].emoji,
    westernName: fullWestern,
    gender: isFemale ? '女名' : '男名',
    genderLabel: isFemale ? 'Female' : 'Male',
    wish,
    quote,
    // Character details for given name card breakdown
    given1detail: phoneticBank.find(e => e.char === given1) || {char:given1, py:py1.replace(/[̄́̌̀]/g,''), el:harmonicEl, meaning:meaning1, radical:'classical'},
    given2detail: phoneticBank.find(e => e.char === given2) || {char:given2, py:py2.replace(/[̄́̌̀]/g,''), el:harmonicEl, meaning:meaning2, radical:'classical'},
    surnameData: sData,
    // Full reasoning rows for the card
    rows: [
      { icon:'姓', label:'Surname', text: surnameRow.replace(/<[^>]+>/g,'') },
      { icon:'五', label:'Five Elements', text: elementRow.replace(/<[^>]+>/g,'') },
      { icon:'音', label:'Phonetics', text: phRow1.replace(/<[^>]+>/g,'') },
      { icon:'意', label:'Meaning & Wish', text: phRow2.replace(/<[^>]+>/g,'') },
      { icon: isFemale?'女':'男', label: isFemale?'Female Tradition':'Male Tradition',
        text: (isFemale
          ? `Your name draws from the 女 (female), 艹 (flower), and 玉 (jade) radical families — the classical vocabulary of feminine names used for three thousand years of Chinese culture.`
          : `Your name draws from the 亻 (person), 木 (tree), and 力 (force) radical families — the classical vocabulary of masculine names used across three millennia of Chinese culture.`) },
      { icon:'和', label:'Harmony', text: harmonyRow.replace(/<[^>]+>/g,'') },
    ]
  };
}

/* ── Download Card — horizontal B&W, 71×45mm @ 300 DPI ─────────── */
async function shareCard() {
  const d = window._cardData;
  if (!d) return;

  // Load QR library
  await new Promise((resolve, reject) => {
    if (window.QRCode) { resolve(); return; }
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
    s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
  const qrDiv = document.createElement('div');
  qrDiv.style.cssText = 'position:fixed;left:-9999px;top:-9999px;width:110px;height:110px';
  document.body.appendChild(qrDiv);
  new QRCode(qrDiv, {
    text: 'https://www.youtube.com/@Bushikesangde',
    width: 110, height: 110,
    colorDark: '#1a1a1a', colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.H
  });
  await new Promise(r => setTimeout(r, 120));
  const qrCanvas = qrDiv.querySelector('canvas');

  // 71mm × 45mm at 300 DPI → 839 × 531 px (landscape)
  const W = 839, H = 531;
  const canvas = document.getElementById('share-canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // ── Helper: auto-scale text to fit maxW ──────────────────────
  function scaledText(text, cx, y, maxW, maxSize, style = '') {
    let sz = maxSize;
    ctx.font = `${style} ${sz}px serif`.trim();
    while (ctx.measureText(text).width > maxW && sz > 12) {
      sz -= 2;
      ctx.font = `${style} ${sz}px serif`.trim();
    }
    ctx.textAlign = 'center';
    ctx.fillText(text, cx, y);
    return sz;
  }

  // ── White background ──────────────────────────────────────────
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);

  // ── Faint ink-wash left and right edges ───────────────────────
  const wL = ctx.createLinearGradient(0, 0, 80, 0);
  wL.addColorStop(0, 'rgba(0,0,0,0.05)'); wL.addColorStop(1, 'transparent');
  ctx.fillStyle = wL; ctx.fillRect(0, 0, 80, H);
  const wR = ctx.createLinearGradient(W - 80, 0, W, 0);
  wR.addColorStop(0, 'transparent'); wR.addColorStop(1, 'rgba(0,0,0,0.05)');
  ctx.fillStyle = wR; ctx.fillRect(W - 80, 0, 80, H);

  // ── Outer + inner border ──────────────────────────────────────
  ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 2.5;
  ctx.strokeRect(12, 12, W - 24, H - 24);
  ctx.strokeStyle = '#444444'; ctx.lineWidth = 0.7;
  ctx.strokeRect(18, 18, W - 36, H - 36);

  // ── Corner seal ornaments ─────────────────────────────────────
  const CS = 20;
  [[12,12],[W-12,12],[12,H-12],[W-12,H-12]].forEach(([cx,cy]) => {
    const ox = cx < W/2 ? 0 : -CS, oy = cy < H/2 ? 0 : -CS;
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(cx+ox, cy+oy, CS, CS);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(cx+ox+3,  cy+oy+8,  14, 1.5); // horizontal bar
    ctx.fillRect(cx+ox+8,  cy+oy+3,  1.5, 14); // vertical bar
    ctx.fillRect(cx+ox+3,  cy+oy+3,  4, 4);    // top-left dot
    ctx.fillRect(cx+ox+13, cy+oy+3,  4, 4);    // top-right dot
    ctx.fillRect(cx+ox+3,  cy+oy+13, 4, 4);    // bottom-left dot
    ctx.fillRect(cx+ox+13, cy+oy+13, 4, 4);    // bottom-right dot
  });

  // ── No vertical divider — name uses full card width ─────────
  const divX = W; // name spans the full width

  // ══════════════════════════════════════════════════
  // MAIN SECTION — name, pinyin, meaning  (full width)
  // ══════════════════════════════════════════════════
  const leftCX = W / 2;
  const leftW  = W - 60;

  // Western name (top, small, grey)
  ctx.fillStyle = '#999999';
  let wnSz = 17;
  ctx.font = `italic ${wnSz}px Georgia,serif`;
  while (ctx.measureText(d.westernName).width > leftW - 10 && wnSz > 10) {
    wnSz--; ctx.font = `italic ${wnSz}px Georgia,serif`;
  }
  ctx.textAlign = 'center';
  ctx.fillText(d.westernName, leftCX, 50);

  // Thin rule
  ctx.strokeStyle = '#e0e0e0'; ctx.lineWidth = 0.6;
  ctx.beginPath(); ctx.moveTo(leftCX - 120, 58); ctx.lineTo(leftCX + 120, 58); ctx.stroke();

  // BIG Chinese name — much larger, vertically centred
  ctx.fillStyle = '#111111';
  scaledText(d.full, leftCX, 230, leftW - 10, 210, 'bold');

  // Rule below name
  ctx.strokeStyle = '#cccccc'; ctx.lineWidth = 0.7;
  ctx.beginPath(); ctx.moveTo(leftCX - 180, 250); ctx.lineTo(leftCX + 180, 250); ctx.stroke();

  // Pinyin — large and clear
  ctx.fillStyle = '#333333';
  let pySz = 32;
  ctx.font = `italic ${pySz}px Georgia,serif`;
  while (ctx.measureText(d.pinyin).width > leftW - 10 && pySz > 14) {
    pySz--; ctx.font = `italic ${pySz}px Georgia,serif`;
  }
  ctx.textAlign = 'center';
  ctx.fillText(d.pinyin, leftCX, 290);

  // Meaning — small grey italic
  ctx.fillStyle = '#888888';
  let mSz = 20;
  const mTxt = `"${d.meaning1}, ${d.meaning2}"`;
  ctx.font = `italic ${mSz}px Georgia,serif`;
  while (ctx.measureText(mTxt).width > leftW - 10 && mSz > 12) {
    mSz--; ctx.font = `italic ${mSz}px Georgia,serif`;
  }
  ctx.fillText(mTxt, leftCX, 320);

  // Seal pattern row
  const patY = 358, sqSz = 5, sqGap = 7, sqCount = 28;
  const patStartX = leftCX - (sqCount * (sqSz + sqGap) - sqGap) / 2;
  for (let i = 0; i < sqCount; i++) {
    const a = i === 0 || i === sqCount-1 ? 0.5 : (i % 2 === 0 ? 0.22 : 0.10);
    ctx.fillStyle = `rgba(0,0,0,${a})`;
    ctx.fillRect(patStartX + i*(sqSz+sqGap), patY, sqSz, sqSz);
  }

  // Faint 名以载志 watermark along bottom
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.05)';
  ctx.font = '11px serif'; ctx.textAlign = 'center';
  ctx.fillText('名以载志  音以传情  ·  名以载志  音以传情  ·  名以载志  音以传情', W/2, H - 20);
  ctx.restore();

  // ══════════════════════════════════════════════════
  // BOTTOM CENTRE — QR bigger + follow text, centred
  // ══════════════════════════════════════════════════
  const QR = 110;
  const qrX = Math.round(W / 2 - QR / 2);
  const qrY = H - 28 - QR - 22;

  if (qrCanvas) {
    ctx.strokeStyle = '#bbbbbb'; ctx.lineWidth = 0.8;
    ctx.strokeRect(qrX - 2, qrY - 2, QR + 4, QR + 4);
    ctx.drawImage(qrCanvas, qrX, qrY, QR, QR);
  }

  // @handle + follow text centred below QR
  ctx.fillStyle = '#444444';
  ctx.font = 'bold 13px Georgia,serif'; ctx.textAlign = 'center';
  ctx.fillText('@Bushikesangde  ·  Follow to learn about China', W/2, qrY + QR + 16);

  // ── Export ────────────────────────────────────────────────────
  const fc = document.createElement('canvas');
  fc.width = W; fc.height = H;
  fc.getContext('2d').drawImage(canvas, 0, 0);
  document.body.removeChild(qrDiv);
  fc.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${d.full}-name-card-71x45mm.png`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 8000);
  }, 'image/png');
}
</script>
</body>
